# Financial Orchestrator - Unified Configuration
# =============================================
# Modular, config-driven trading system

trading:
  symbol: BTCUSDT
  leverage: 75
  update_interval: 30
  initial_capital: 10000
  mode: paper  # paper, live, backtest

# ===== LAYER CONFIGURATIONS =====
layers:
  # ===== LAYER 1: DATA =====
  data:
    enabled: true
    type: binance  # swap: mock, file
    config:
      symbol: BTCUSDT
      testnet: true
      interval: 1m
      buffer_size: 100
      reconnect_interval: 5

  # ===== LAYER 2: FEATURES =====
  features:
    enabled: true
    type: technical
    config:
      indicators:
        - atr
        - adx
        - rsi
        - macd
        - bollinger
        - ema
      periods:
        atr: 14
        adx: 14
        rsi: 14
        macd_fast: 12
        macd_slow: 26
        macd_signal: 9
        bollinger_period: 20
        bollinger_std: 2
        ema_fast: 10
        ema_slow: 30

  # ===== LAYER 3: STRATEGY =====
  strategy:
    enabled: true
    default: momentum
    active:
      - momentum
      - mean_reversion
      - breakout
    config:
      momentum:
        fast_window: 10
        slow_window: 30
      mean_reversion:
        period: 20
        std_dev: 2
      breakout:
        period: 20
        atr_multiplier: 2

  # ===== LAYER 4: INTELLIGENCE =====
  intelligence:
    enabled: true
    components:
      hmm:
        enabled: true
        n_states: 4
        lookback_bars: 100
      decision_tree:
        enabled: true
        max_depth: 5
      self_learning:
        enabled: true
        retrain_interval: 1800
        min_samples: 50
      adaptive:
        enabled: true
        regime_strategy_map:
          bull: MomentumCtaStrategy
          bear: MeanReversionCtaStrategy
          volatile: BreakoutCtaStrategy
          sideways: RlEnhancedCtaStrategy

  # ===== LAYER 5: SCORING =====
  scoring:
    enabled: true
    threshold: 0.72
    high_conviction: 0.85
    weights:
      momentum: 0.28
      breakout: 0.25
      volatility: 0.17
      confidence: 0.20
      volume: 0.10

  # ===== LAYER 6: RISK =====
  risk:
    enabled: true
    max_daily_trades: 5
    max_position_pct: 0.10
    max_daily_loss_pct: 0.05
    max_drawdown_pct: 0.20
    stop_loss_pct: 0.02
    take_profit_pct: 0.05
    max_consecutive_losses: 3

  # ===== LAYER 7: EXECUTION =====
  execution:
    enabled: true
    mode: paper  # swap: live, backtest
    slippage: 0.001
    fee: 0.0004
    initial_balance: 10000
    leverage: 75

  # ===== LAYER 9: MEMORY (PostgreSQL) =====
  memory:
    enabled: true
    postgres:
      enabled: true
      host: localhost
      port: 5432
      database: trading_system
      user: trader
      password: nwa45690
    redis:
      enabled: true
      host: localhost
      port: 6379
    duckdb:
      enabled: true
      path: data_lab/market_data.duckdb

  # ===== LAYER 10: OUTPUT =====
  output:
    enabled: true
    telegram:
      enabled: true
      bot_token: ${TELEGRAM_BOT_TOKEN}
      admin_chat_ids:
        - ${ADMIN_CHAT_ID}
    dashboard:
      enabled: true
      host: 0.0.0.0
      port: 8080
    reports:
      decision_interval: 30
      daily_report_time: "00:00"

# ===== EXPLORATION SETTINGS =====
exploration:
  enabled: true
  epsilon: 0.1
  min_epsilon: 0.01
  epsilon_decay: 0.995
  exploration_budget: 0.2  # 20% of trades can be exploration

# ===== REGIME MULTIPLIERS =====
regime_multipliers:
  bull:
    position_size: 1.2
    stop_loss: 0.02
  bear:
    position_size: 0.8
    stop_loss: 0.015
  volatile:
    position_size: 0.5
    stop_loss: 0.025
  sideways:
    position_size: 0.6
    stop_loss: 0.015

version: '3.8'

services:
  # PostgreSQL - Main database for trading system
  postgres:
    image: postgres:15-alpine
    container_name: trading_postgres
    environment:
      POSTGRES_DB: trading_system
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: nwa45690
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Cache & real-time operations
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Trading Engine - Main application
  trading_engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_engine
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=trading_system
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=nwa45690
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TRADING_MODE=${TRADING_MODE:-paper}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ADMIN_CHAT_IDS=${ADMIN_CHAT_IDS:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
      - ./memory:/app/memory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Dashboard - Web UI
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: trading_dashboard
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: trading_network
